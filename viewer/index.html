<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFC-Lite 3D Tiles Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
    canvas { display: block; }
    #panel {
      position: absolute; top: 10px; left: 10px; z-index: 1000;
      background: rgba(0,0,0,0.87); color: #fff;
      border-radius: 6px; font-family: monospace; font-size: 13px;
      max-height: 90vh; overflow-y: auto;
      min-width: 240px; max-width: 300px;
    }
    #panel-header {
      padding: 10px 14px; cursor: pointer; user-select: none;
      font-size: 14px; font-weight: bold;
      display: flex; align-items: center; justify-content: space-between;
    }
    #panel-header:hover { color: #4fc3f7; }
    #panel-body { padding: 0 10px 10px; }

    select.ts-select {
      width: 100%; background: #222; color: #eee;
      border: 1px solid #555; padding: 3px 4px; margin-bottom: 6px;
      font-family: monospace; font-size: 12px; border-radius: 3px; cursor: pointer;
    }

    .fsec { border-top: 1px solid #2a2a3a; padding-top: 4px; margin-top: 4px; }
    .fsec-hdr {
      cursor: pointer; user-select: none; font-size: 11px; color: #778;
      padding: 2px 0 3px; display: flex; align-items: center; justify-content: space-between;
    }
    .fsec-hdr:hover { color: #aab; }
    .fsec-body { padding: 0 0 2px 2px; }
    .fsec-actions {
      display: flex; gap: 4px; margin-bottom: 3px; flex-wrap: wrap;
    }
    .fsec-actions button, .btn {
      background: none; border: 1px solid #444; color: #889; font-size: 10px;
      font-family: monospace; padding: 1px 5px; border-radius: 3px; cursor: pointer;
    }
    .fsec-actions button:hover, .btn:hover { color: #4fc3f7; border-color: #4fc3f7; }
    .btn-primary {
      background: #1a3a5c; border-color: #4fc3f7; color: #4fc3f7;
    }
    .btn-primary:hover { background: #2a5a8c; }

    .fi {
      display: flex; align-items: center; gap: 5px;
      padding: 1px 0; font-size: 12px; cursor: pointer; user-select: none;
    }
    .fi:hover .fi-lbl { color: #4fc3f7; }
    .fi input[type=checkbox] { cursor: pointer; accent-color: #4fc3f7; flex-shrink: 0; }
    .fi-lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fi-cnt { color: #555; font-size: 10px; flex-shrink: 0; }
    .fi-status { font-size: 9px; flex-shrink: 0; margin-left: 2px; }
    .fi-status.loaded { color: #4caf50; }
    .fi-status.pending { color: #666; }
    .zt-children { padding-left: 14px; }

    #stats {
      margin-top: 6px; padding-top: 6px; border-top: 1px solid #2a2a3a;
      color: #778; font-size: 11px; line-height: 1.6;
    }
    .ph { color: #445; font-size: 11px; }

    #load-bar {
      display: flex; align-items: center; gap: 4px; margin-top: 4px; margin-bottom: 2px;
    }
    #load-bar label { font-size: 10px; color: #667; cursor: pointer; user-select: none; }
    #load-bar input[type=checkbox] { accent-color: #4fc3f7; cursor: pointer; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "/node_modules/three/build/three.module.js",
        "three/examples/jsm/": "/node_modules/three/examples/jsm/",
        "3d-tiles-renderer": "/node_modules/3d-tiles-renderer/src/index.js",
        "3d-tiles-renderer/plugins": "/node_modules/3d-tiles-renderer/src/plugins/index.js"
      }
    }
  </script>
</head>
<body>
  <div id="panel">
    <div id="panel-header">IFC-Lite Viewer <span id="panel-arrow">▼</span></div>
    <div id="panel-body">
      <div style="color:#556;font-size:11px;margin-bottom:3px">Tileset:</div>
      <select class="ts-select" id="tileset-select"><option>Loading…</option></select>

      <div class="fsec">
        <div class="fsec-hdr" data-target="fl-models">
          <span>Models</span><span class="fsa">▼</span>
        </div>
        <div id="fl-models" class="fsec-body"><span class="ph">Loading tileset…</span></div>
      </div>

      <div class="fsec">
        <div class="fsec-hdr" data-target="fl-zones">
          <span>Zones</span><span class="fsa">▼</span>
        </div>
        <div id="fl-zones" class="fsec-body"><span class="ph">—</span></div>
      </div>

      <div class="fsec">
        <div class="fsec-hdr" data-target="fl-classes">
          <span>Classes</span><span class="fsa">▼</span>
        </div>
        <div id="fl-classes" class="fsec-body"><span class="ph">—</span></div>
      </div>

      <div id="stats"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
    import { TilesRenderer } from '3d-tiles-renderer';
    import { UpdateOnChangePlugin } from '3d-tiles-renderer/plugins';

    // --- Three.js setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1e1e2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1.0, 100000);
    camera.position.set(200, 200, 200);
    camera.up.set(0, 0, 1);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dl1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dl1.position.set(100, 200, 300);
    scene.add(dl1);
    const dl2 = new THREE.DirectionalLight(0xffffff, 0.3);
    dl2.position.set(-100, -100, 100);
    scene.add(dl2);

    const gridHelper = new THREE.GridHelper(2000, 50, 0x444466, 0x333355);
    gridHelper.rotation.x = Math.PI / 2;
    scene.add(gridHelper);
    scene.add(new THREE.AxesHelper(20));

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      for (const r of Object.values(modelRenderers)) {
        r.setResolutionFromRenderer(camera, renderer);
      }
    });

    // --- Panel toggle ---
    document.getElementById('panel-header').addEventListener('click', () => {
      const body = document.getElementById('panel-body');
      const arrow = document.getElementById('panel-arrow');
      const open = body.style.display !== 'none';
      body.style.display = open ? 'none' : '';
      arrow.textContent = open ? '▶' : '▼';
    });

    // --- Filter section collapse/expand ---
    document.querySelectorAll('.fsec-hdr').forEach(hdr => {
      hdr.addEventListener('click', (e) => {
        const body = document.getElementById(hdr.dataset.target);
        const arrow = hdr.querySelector('.fsa');
        const open = body.style.display !== 'none';
        body.style.display = open ? 'none' : '';
        if (arrow) arrow.textContent = open ? '▶' : '▼';
      });
    });

    // --- Orbit pivot: drag orbits around the geometry under the cursor ---
    // Custom orbit bypasses OrbitControls to avoid the lookAt jump.
    const raycaster = new THREE.Raycaster();

    // Pivot indicator ball
    const pivotBall = new THREE.Mesh(
      new THREE.SphereGeometry(1, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.7, depthTest: false })
    );
    pivotBall.renderOrder = 999;
    pivotBall.visible = false;
    scene.add(pivotBall);

    let _orbitPivot = null;   // world-space hit point
    let _orbitActive = false;
    let _lastMouse = null;

    renderer.domElement.addEventListener('pointerdown', (e) => {
      if (e.button !== 0) return;
      _orbitPivot = null;
      _orbitActive = false;
      _lastMouse = { x: e.clientX, y: e.clientY };

      const groups = Object.values(modelRenderers).map(r => r.group);
      if (groups.length === 0) return;
      const rect = renderer.domElement.getBoundingClientRect();
      const ndc = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1,
      );
      raycaster.setFromCamera(ndc, camera);
      const hits = raycaster.intersectObjects(groups, true)
        .filter(h => h.object.visible);
      if (hits.length > 0) {
        _orbitPivot = hits[0].point.clone();
      }
    });

    renderer.domElement.addEventListener('pointermove', (e) => {
      if (!_orbitPivot || !_lastMouse) return;
      const dx = e.clientX - _lastMouse.x;
      const dy = e.clientY - _lastMouse.y;

      if (!_orbitActive) {
        if (dx * dx + dy * dy < 4) return; // wait for real drag
        _orbitActive = true;
        // Disable OrbitControls — we handle rotation manually
        controls.enabled = false;

        pivotBall.position.copy(_orbitPivot);
        const dist = camera.position.distanceTo(_orbitPivot);
        pivotBall.scale.setScalar(dist * 0.008);
        pivotBall.visible = true;
      }

      // Rotate camera around pivot point
      const speed = 0.005;
      const azimuth = -dx * speed;  // horizontal
      const polar = -dy * speed;    // vertical

      // Vector from pivot to camera
      const offset = camera.position.clone().sub(_orbitPivot);

      // Rotate around world Z (azimuth)
      const qAz = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), azimuth);
      offset.applyQuaternion(qAz);

      // Rotate around camera's local X (polar / elevation)
      const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
      const qPol = new THREE.Quaternion().setFromAxisAngle(right, polar);
      offset.applyQuaternion(qPol);

      // Apply
      camera.position.copy(_orbitPivot).add(offset);

      // Also rotate the target by the same amount so lookAt direction stays consistent
      const tOffset = controls.target.clone().sub(_orbitPivot);
      tOffset.applyQuaternion(qAz);
      tOffset.applyQuaternion(qPol);
      controls.target.copy(_orbitPivot).add(tOffset);

      camera.lookAt(controls.target);
      _lastMouse = { x: e.clientX, y: e.clientY };
    });

    renderer.domElement.addEventListener('pointerup', () => {
      if (_orbitActive) {
        controls.enabled = true;
        controls.update();
      }
      _orbitPivot = null;
      _orbitActive = false;
      _lastMouse = null;
      setTimeout(() => { pivotBall.visible = false; }, 300);
    });

    // --- Scroll zoom toward mouse cursor ---
    // Disable OrbitControls zoom, handle it ourselves.
    controls.enableZoom = false;
    let _mouseNdc = new THREE.Vector2();
    renderer.domElement.addEventListener('mousemove', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      _mouseNdc.set(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1,
      );
    });
    renderer.domElement.addEventListener('wheel', (e) => {
      e.preventDefault();
      const zoomSpeed = 0.04;
      const factor = e.deltaY > 0 ? -zoomSpeed : zoomSpeed;

      // Ray from camera through mouse
      const dir = new THREE.Vector3(_mouseNdc.x, _mouseNdc.y, 0.5)
        .unproject(camera)
        .sub(camera.position)
        .normalize();

      // Move camera along the mouse ray
      const dist = camera.position.distanceTo(controls.target);
      const step = dist * factor;
      camera.position.addScaledVector(dir, step);
      controls.target.addScaledVector(dir, step);
      controls.update();
    }, { passive: false });

    // --- URL params ---
    const params = new URLSearchParams(window.location.search);
    const tilesetParam = params.get('tileset') || '';
    const TILESET_BASE = '/tileset';
    const tilesetRoot = `${TILESET_BASE}/${tilesetParam}`;

    // Filter state from URL (comma-separated)
    function setFromParam(key) {
      const v = params.get(key);
      return v ? new Set(v.split(',').map(s => s.trim()).filter(Boolean)) : new Set();
    }

    // Models to load (positive list from URL; empty = none loaded initially)
    const loadedModelNames = setFromParam('models');
    const hiddenZones = setFromParam('hideZones');
    const hiddenClasses = setFromParam('hideClasses');
    const autoLoad = params.get('autoload') === '1';

    function updateUrl() {
      const np = new URLSearchParams();
      np.set('tileset', tilesetParam);
      if (loadedModelNames.size > 0) np.set('models', [...loadedModelNames].join(','));
      if (hiddenZones.size > 0) np.set('hideZones', [...hiddenZones].join(','));
      if (hiddenClasses.size > 0) np.set('hideClasses', [...hiddenClasses].join(','));
      if (autoLoad) np.set('autoload', '1');
      window.history.replaceState(null, '', `${window.location.pathname}?${np.toString()}`);
    }

    // --- Tileset selector ---
    async function initTilesetSelector() {
      const select = document.getElementById('tileset-select');
      try {
        const tilesets = await fetch('/api/tilesets').then(r => r.json());
        select.innerHTML = '';
        for (const ts of tilesets) {
          const opt = document.createElement('option');
          opt.value = ts.path;
          opt.textContent = ts.label;
          if (ts.path === tilesetParam) opt.selected = true;
          select.appendChild(opt);
        }
        if (!tilesets.some(ts => ts.path === tilesetParam)) {
          const opt = document.createElement('option');
          opt.value = tilesetParam;
          opt.textContent = tilesetParam;
          opt.selected = true;
          select.insertBefore(opt, select.firstChild);
        }
      } catch {
        select.innerHTML = `<option value="${tilesetParam}">${tilesetParam}</option>`;
      }
      select.addEventListener('change', () => {
        const np = new URLSearchParams();
        np.set('tileset', select.value);
        window.location.search = np.toString();
      });
    }
    initTilesetSelector();

    // --- Data from tileset.json (parsed once, no downloads) ---
    const modelRegistry = new Map(); // name -> { url, selected, loaded, zoneTree }

    // Zone/class registries (populated as tiles load)
    const knownClasses = new Map();
    const zoneNodes = new Map();

    function registerZonePath(zonePath) {
      const parts = zonePath.split('/');
      for (let i = 1; i <= parts.length; i++) {
        const path = parts.slice(0, i).join('/');
        if (!zoneNodes.has(path)) {
          const parent = i > 1 ? parts.slice(0, i - 1).join('/') : null;
          zoneNodes.set(path, { name: parts[i - 1], parent, childPaths: [] });
          if (parent) {
            const pNode = zoneNodes.get(parent);
            if (pNode && !pNode.childPaths.includes(path)) pNode.childPaths.push(path);
          }
        }
      }
    }

    function registerTileMeta(props) {
      const { zone, ifcClass, elementCount = 0 } = props;
      knownClasses.set(ifcClass, (knownClasses.get(ifcClass) || 0) + elementCount);
      registerZonePath(zone);
    }

    // --- Visibility (zone/class filters applied to loaded tiles) ---
    function isGroupVisible(meta) {
      if (!meta) return true;
      const { zone, ifcClass } = meta;
      if (hiddenClasses.has(ifcClass)) return false;
      const parts = zone.split('/');
      for (let i = 1; i <= parts.length; i++) {
        if (hiddenZones.has(parts.slice(0, i).join('/'))) return false;
      }
      return true;
    }

    function reapplyAllFilters() {
      for (const r of Object.values(modelRenderers)) {
        r.group.traverse(obj => {
          if (obj.userData.tileMeta) obj.visible = isGroupVisible(obj.userData.tileMeta);
        });
      }
    }

    function setZoneVisible(path, visible) {
      if (visible) hiddenZones.delete(path); else hiddenZones.add(path);
      const node = zoneNodes.get(path);
      if (node) for (const child of node.childPaths) setZoneVisible(child, visible);
    }

    // --- Per-model TilesRenderer instances ---
    const modelRenderers = {};
    let hasAutoZoomed = false;

    function loadModel(name) {
      const entry = modelRegistry.get(name);
      if (!entry || modelRenderers[name]) return;

      loadedModelNames.add(name);
      entry.loaded = true;

      const r = new TilesRenderer(entry.url);
      r.registerPlugin(new UpdateOnChangePlugin());
      r.setCamera(camera);
      r.setResolutionFromRenderer(camera, renderer);
      r.errorTarget = 8;
      scene.add(r.group);
      modelRenderers[name] = r;

      r.addEventListener('load-model', (e) => {
        const meta = e.tile?.metadata;
        const group = e.scene;
        if (meta?.class === 'IfcClassGroup' && meta?.properties && group) {
          group.userData.tileMeta = meta.properties;
          registerTileMeta(meta.properties);
          group.visible = isGroupVisible(meta.properties);
          scheduleFilterRebuild();
        }
        updateStats();
        if (!hasAutoZoomed) {
          hasAutoZoomed = true;
          setTimeout(() => V.zoomToFit(), 800);
        }
      });
      r.addEventListener('dispose-model', updateStats);
      r.addEventListener('load-tile-set', updateStats);

      updateUrl();
      rebuildModelList();
    }

    function unloadModel(name) {
      const entry = modelRegistry.get(name);
      if (entry) entry.loaded = false;
      loadedModelNames.delete(name);

      const r = modelRenderers[name];
      if (r) {
        scene.remove(r.group);
        r.dispose();
        delete modelRenderers[name];
      }

      updateUrl();
      updateStats();
      rebuildModelList();
    }

    // --- Parse root tileset to discover models (metadata only, no GLB loading) ---
    async function discoverModels() {
      const container = document.getElementById('fl-models');
      try {
        const rootTileset = await fetch(`${tilesetRoot}/tileset.json`).then(r => r.json());
        const rootChildren = rootTileset.root?.children || [];

        // Also try to pre-parse zone structure from model tilesets
        for (const child of rootChildren) {
          const name = child.metadata?.properties?.name || child.content?.uri?.split('/')[0];
          const uri = child.content?.uri;
          if (name && uri) {
            const url = `${tilesetRoot}/${uri}`;
            const shouldLoad = autoLoad || loadedModelNames.has(name);
            modelRegistry.set(name, { url, selected: shouldLoad, loaded: false });
          }
        }

        if (modelRegistry.size === 0) {
          // Fallback: single tileset, auto-load
          modelRegistry.set('default', { url: `${tilesetRoot}/tileset.json`, selected: true, loaded: false });
        }

        // Pre-parse zone tree from first model tileset (for zone panel)
        await discoverZones(rootChildren);

        // Build the model selection UI
        rebuildModelList();

        // Auto-load selected models
        for (const [name, entry] of modelRegistry) {
          if (entry.selected) loadModel(name);
        }

      } catch (err) {
        console.error('[Viewer] Failed to load tileset:', err);
        container.innerHTML = `<span class="ph">Error: ${err.message}</span>`;
      }
    }

    // Pre-parse zone structure from model tilesets without loading GLBs
    async function discoverZones(rootChildren) {
      // Pick first model to discover zone structure
      const firstModel = rootChildren[0];
      if (!firstModel?.content?.uri) return;
      try {
        const modelTileset = await fetch(`${tilesetRoot}/${firstModel.content.uri}`).then(r => r.json());
        function walkZones(node, parentPath) {
          const meta = node.metadata;
          if (meta?.class === 'Zone' && meta?.properties?.path) {
            registerZonePath(meta.properties.path);
          }
          if (node.children) {
            for (const child of node.children) walkZones(child, meta?.properties?.path || parentPath);
          }
        }
        walkZones(modelTileset.root, '');
        scheduleFilterRebuild();
      } catch { /* zone discovery is best-effort */ }
    }

    discoverModels();

    // --- Model list UI ---
    function rebuildModelList() {
      const container = document.getElementById('fl-models');
      if (modelRegistry.size === 0) return;
      container.innerHTML = '';

      // Actions row
      const actions = document.createElement('div');
      actions.className = 'fsec-actions';

      const btnLoadSel = document.createElement('button');
      btnLoadSel.textContent = 'Load selected';
      btnLoadSel.className = 'btn btn-primary';
      btnLoadSel.addEventListener('click', () => {
        for (const [name, entry] of modelRegistry) {
          if (entry.selected && !entry.loaded) loadModel(name);
          if (!entry.selected && entry.loaded) unloadModel(name);
        }
      });

      const btnAll = document.createElement('button');
      btnAll.textContent = 'All';
      btnAll.addEventListener('click', () => {
        for (const entry of modelRegistry.values()) entry.selected = true;
        rebuildModelList();
      });

      const btnNone = document.createElement('button');
      btnNone.textContent = 'None';
      btnNone.addEventListener('click', () => {
        for (const entry of modelRegistry.values()) entry.selected = false;
        rebuildModelList();
      });

      actions.append(btnLoadSel, btnAll, btnNone);
      container.appendChild(actions);

      // Model rows
      const sorted = [...modelRegistry.entries()].sort((a, b) => a[0].localeCompare(b[0]));
      for (const [name, entry] of sorted) {
        const row = document.createElement('label');
        row.className = 'fi';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = entry.selected;
        cb.addEventListener('change', () => {
          entry.selected = cb.checked;
          // If already loaded and unchecking, unload immediately
          if (!cb.checked && entry.loaded) {
            unloadModel(name);
          }
          // If checking and autoload or already applied, load immediately
          if (cb.checked && !entry.loaded) {
            loadModel(name);
          }
        });
        const lbl = document.createElement('span');
        lbl.className = 'fi-lbl';
        lbl.textContent = name;
        lbl.title = name;
        const status = document.createElement('span');
        status.className = `fi-status ${entry.loaded ? 'loaded' : 'pending'}`;
        status.textContent = entry.loaded ? '●' : '○';
        status.title = entry.loaded ? 'Loaded' : 'Not loaded';
        row.append(cb, lbl, status);
        container.appendChild(row);
      }
    }

    // --- Zone/Class filter UI ---
    let filterRebuildTimer = null;
    function scheduleFilterRebuild() {
      if (filterRebuildTimer) clearTimeout(filterRebuildTimer);
      filterRebuildTimer = setTimeout(rebuildFilters, 250);
    }

    function rebuildFilters() {
      rebuildClassList();
      rebuildZoneTree();
    }

    function rebuildClassList() {
      const container = document.getElementById('fl-classes');
      if (!container || knownClasses.size === 0) return;
      container.innerHTML = '';

      const actions = document.createElement('div');
      actions.className = 'fsec-actions';
      const btnAll = document.createElement('button');
      btnAll.textContent = 'All';
      btnAll.addEventListener('click', () => {
        hiddenClasses.clear(); reapplyAllFilters(); updateUrl(); rebuildClassList();
      });
      const btnNone = document.createElement('button');
      btnNone.textContent = 'None';
      btnNone.addEventListener('click', () => {
        for (const k of knownClasses.keys()) hiddenClasses.add(k);
        reapplyAllFilters(); updateUrl(); rebuildClassList();
      });
      actions.append(btnAll, btnNone);
      container.appendChild(actions);

      const entries = [...knownClasses].sort((a, b) => b[1] - a[1]);
      for (const [key, count] of entries) {
        const row = document.createElement('label');
        row.className = 'fi';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = !hiddenClasses.has(key);
        cb.addEventListener('change', () => {
          if (cb.checked) hiddenClasses.delete(key); else hiddenClasses.add(key);
          reapplyAllFilters(); updateUrl();
        });
        const lbl = document.createElement('span');
        lbl.className = 'fi-lbl';
        lbl.textContent = key;
        lbl.title = key;
        const cnt = document.createElement('span');
        cnt.className = 'fi-cnt';
        cnt.textContent = count.toLocaleString();
        row.append(cb, lbl, cnt);
        container.appendChild(row);
      }
    }

    function rebuildZoneTree() {
      const container = document.getElementById('fl-zones');
      if (!container || zoneNodes.size === 0) return;
      container.innerHTML = '';

      const actions = document.createElement('div');
      actions.className = 'fsec-actions';
      const btnAll = document.createElement('button');
      btnAll.textContent = 'All';
      btnAll.addEventListener('click', () => {
        hiddenZones.clear(); reapplyAllFilters(); updateUrl(); rebuildZoneTree();
      });
      const btnNone = document.createElement('button');
      btnNone.textContent = 'None';
      btnNone.addEventListener('click', () => {
        for (const k of zoneNodes.keys()) hiddenZones.add(k);
        reapplyAllFilters(); updateUrl(); rebuildZoneTree();
      });
      actions.append(btnAll, btnNone);
      container.appendChild(actions);

      const roots = [...zoneNodes.keys()].filter(p => !zoneNodes.get(p).parent).sort();
      for (const root of roots) container.appendChild(buildZoneEl(root));
    }

    function buildZoneEl(path) {
      const node = zoneNodes.get(path);
      const wrap = document.createElement('div');
      const row = document.createElement('label');
      row.className = 'fi';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = !hiddenZones.has(path);
      cb.addEventListener('change', () => {
        setZoneVisible(path, cb.checked);
        reapplyAllFilters(); updateUrl(); rebuildZoneTree();
      });
      const lbl = document.createElement('span');
      lbl.className = 'fi-lbl';
      lbl.textContent = node.name;
      row.append(cb, lbl);
      wrap.appendChild(row);
      if (node.childPaths.length > 0) {
        const children = document.createElement('div');
        children.className = 'zt-children';
        for (const child of [...node.childPaths].sort()) children.appendChild(buildZoneEl(child));
        wrap.appendChild(children);
      }
      return wrap;
    }

    // --- Stats ---
    function updateStats() {
      let totalActive = 0, totalVis = 0, totalDownloading = 0;
      const rendererCount = Object.keys(modelRenderers).length;
      for (const r of Object.values(modelRenderers)) {
        const s = r.stats;
        totalActive += s.active;
        totalVis += s.visible;
        totalDownloading += s.downloading;
      }
      const sse = Object.values(modelRenderers)[0]?.errorTarget || 8;
      document.getElementById('stats').innerHTML =
        `Tiles: ${totalVis} vis / ${totalActive} act (${rendererCount} renderers)<br>` +
        `Loading: ${totalDownloading} | SSE: ${sse}px`;
    }
    setInterval(updateStats, 1000);

    // --- Animate ---
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      for (const r of Object.values(modelRenderers)) {
        r.setCamera(camera);
        r.setResolutionFromRenderer(camera, renderer);
        r.update();
      }
      renderer.render(scene, camera);
    }
    animate();

    // --- Global Viewer API (window.V) ---
    const V = {};
    V._scene = scene;
    V._camera = camera;
    V._controls = controls;
    V._renderer = renderer;
    V._tiles = () => modelRenderers;

    V.errorTarget = (val) => {
      if (val !== undefined) {
        for (const r of Object.values(modelRenderers)) r.errorTarget = val;
      }
      updateStats();
      return { errorTarget: val || Object.values(modelRenderers)[0]?.errorTarget };
    };

    V.quality = (preset) => {
      const presets = { high: 2, medium: 8, low: 20 };
      const val = presets[preset];
      if (val === undefined) return { error: `Use: ${Object.keys(presets).join(', ')}` };
      for (const r of Object.values(modelRenderers)) r.errorTarget = val;
      updateStats();
      return { preset, errorTarget: val };
    };

    V.tileStats = () => {
      const result = {};
      for (const [name, r] of Object.entries(modelRenderers)) result[name] = { ...r.stats };
      return result;
    };

    V.nodes = () => {
      const names = [];
      scene.traverse(o => { if (o.isMesh) names.push(o.name || `(id:${o.id})`); });
      return names;
    };

    V.find = (q) => {
      const ql = q.toLowerCase(), results = [];
      scene.traverse(o => { if (o.isMesh && o.name?.toLowerCase().includes(ql)) results.push(o.name); });
      return results;
    };

    V.stats = () => {
      let meshes = 0, tris = 0, verts = 0;
      scene.traverse(o => {
        if (!o.isMesh) return;
        meshes++;
        const g = o.geometry;
        tris += g.index ? g.index.count / 3 : (g.attributes.position?.count / 3 || 0);
        verts += g.attributes.position?.count || 0;
      });
      return { meshes, triangles: Math.round(tris), vertices: verts };
    };

    V.zoomToFit = (filter) => {
      const box = new THREE.Box3();
      let count = 0;
      scene.traverse(o => {
        if (!o.isMesh || !o.visible) return;
        if (filter && !(o.name || '').toLowerCase().includes(filter.toLowerCase())) return;
        box.expandByObject(o); count++;
      });
      if (box.isEmpty()) return { error: 'No visible meshes', filter };
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      controls.target.copy(center);
      camera.position.set(center.x + maxDim * 0.8, center.y - maxDim * 0.8, center.z + maxDim * 0.5);
      controls.update();
      return { matched: count, center: center.toArray().map(v => +v.toFixed(2)) };
    };

    V.isolate = (filter) => {
      const q = filter.toLowerCase();
      let shown = 0, hidden = 0;
      scene.traverse(o => {
        if (!o.isMesh) return;
        const match = (o.name || '').toLowerCase().includes(q);
        o.visible = match;
        match ? shown++ : hidden++;
      });
      return { shown, hidden };
    };

    V.showAll = () => {
      let count = 0;
      scene.traverse(o => { if (o.isMesh) { o.visible = true; count++; } });
      return { shown: count };
    };

    V.hide = (filter) => {
      const q = filter.toLowerCase();
      let hidden = 0;
      scene.traverse(o => {
        if (o.isMesh && (o.name || '').toLowerCase().includes(q)) { o.visible = false; hidden++; }
      });
      return { hidden };
    };

    V.bounds = (filter) => {
      const box = new THREE.Box3();
      let count = 0;
      scene.traverse(o => {
        if (o.isMesh && (o.name || '').toLowerCase().includes(filter.toLowerCase())) {
          box.expandByObject(o); count++;
        }
      });
      if (box.isEmpty()) return { error: 'Not found' };
      return { matched: count, min: box.min.toArray().map(v => +v.toFixed(3)), max: box.max.toArray().map(v => +v.toFixed(3)) };
    };

    V.setCamera = (pos, target) => {
      if (pos) camera.position.set(...pos);
      if (target) controls.target.set(...target);
      controls.update();
      return { position: camera.position.toArray().map(v => +v.toFixed(2)), target: controls.target.toArray().map(v => +v.toFixed(2)) };
    };

    V.getCamera = () => ({
      position: camera.position.toArray().map(v => +v.toFixed(2)),
      target: controls.target.toArray().map(v => +v.toFixed(2)),
    });

    V.highlight = (filter, color = 0xff0000) => {
      const q = filter.toLowerCase();
      let count = 0;
      scene.traverse(o => {
        if (!o.isMesh || !(o.name || '').toLowerCase().includes(q)) return;
        if (!o.userData._origMat) o.userData._origMat = o.material;
        o.material = new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide });
        count++;
      });
      return { highlighted: count };
    };

    V.unhighlight = (filter) => {
      const q = filter ? filter.toLowerCase() : null;
      let count = 0;
      scene.traverse(o => {
        if (!o.isMesh || !o.userData._origMat) return;
        if (q && !(o.name || '').toLowerCase().includes(q)) return;
        o.material = o.userData._origMat;
        delete o.userData._origMat;
        count++;
      });
      return { restored: count };
    };

    V.wireframe = (on = true, filter) => {
      let count = 0;
      scene.traverse(o => {
        if (!o.isMesh) return;
        if (filter && !(o.name || '').toLowerCase().includes(filter.toLowerCase())) return;
        o.material.wireframe = on; count++;
      });
      return { affected: count, wireframe: on };
    };

    V.xray = (filter, opacity = 0.1) => {
      const q = filter.toLowerCase();
      let solid = 0, faded = 0;
      scene.traverse(o => {
        if (!o.isMesh) return;
        const match = (o.name || '').toLowerCase().includes(q);
        if (!o.userData._origMat) o.userData._origMat = o.material;
        if (match) { o.material = o.userData._origMat; solid++; }
        else {
          o.material = new THREE.MeshStandardMaterial({ color: 0x888888, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false });
          faded++;
        }
      });
      return { solid, faded };
    };

    V.focusOn = (filter) => {
      V.isolate(filter);
      const box = new THREE.Box3();
      scene.traverse(o => { if (o.isMesh && o.visible) box.expandByObject(o); });
      if (box.isEmpty()) return { error: 'No matching meshes' };
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      controls.target.copy(center);
      camera.position.copy(center).addScaledVector(new THREE.Vector3(0, -1, 0.5).normalize(), maxDim * 1.5);
      camera.up.set(0, 0, 1);
      controls.update();
      return { center: center.toArray().map(v => +v.toFixed(2)) };
    };

    V.inspect = (filter) => { V.showAll(); V.unhighlight(); return { ...V.xray(filter, 0.05), ...V.zoomToFit(filter) }; };

    V.filter = {
      hideModel:  (m) => { unloadModel(m); scheduleFilterRebuild(); },
      showModel:  (m) => { loadModel(m); scheduleFilterRebuild(); },
      hideClass:  (c) => { hiddenClasses.add(c); reapplyAllFilters(); updateUrl(); scheduleFilterRebuild(); },
      showClass:  (c) => { hiddenClasses.delete(c); reapplyAllFilters(); updateUrl(); scheduleFilterRebuild(); },
      hideZone:   (z) => { setZoneVisible(z, false); reapplyAllFilters(); updateUrl(); scheduleFilterRebuild(); },
      showZone:   (z) => { setZoneVisible(z, true); reapplyAllFilters(); updateUrl(); scheduleFilterRebuild(); },
      reset:      ()  => {
        for (const name of modelRegistry.keys()) {
          const entry = modelRegistry.get(name);
          entry.selected = true;
          if (!entry.loaded) loadModel(name);
        }
        hiddenZones.clear(); hiddenClasses.clear();
        reapplyAllFilters(); updateUrl(); scheduleFilterRebuild();
      },
      state:      ()  => ({
        loaded: [...loadedModelNames],
        hiddenZones: [...hiddenZones],
        hiddenClasses: [...hiddenClasses],
        available: [...modelRegistry.keys()],
      }),
    };

    V.help = () => ({
      'V.errorTarget(n)': 'Set SSE pixel threshold (lower=more detail). Default 8.',
      'V.quality("high"|"medium"|"low")': 'Preset: high=2px, medium=8px, low=20px',
      'V.tileStats()': '3d-tiles-renderer stats per model',
      'V.filter.hideModel("B-290")': 'Unload a model (disposes renderer & frees memory)',
      'V.filter.showModel("B-290")': 'Load a model',
      'V.filter.hideClass("IfcWall")': 'Hide all tiles of a class',
      'V.filter.showZone("D0/HAV0")': 'Show a zone',
      'V.filter.reset()': 'Load all models, clear all filters',
      'V.filter.state()': 'Show current filter state',
      'V.nodes()': 'List all mesh names',
      'V.find(q)': 'Search mesh names by substring',
      'V.stats()': 'Scene mesh/tri/vert counts',
      'V.zoomToFit(filter?)': 'Zoom to visible meshes',
      'V.focusOn(filter)': 'Isolate + zoom',
      'V.isolate(filter)': 'Show only matching meshes',
      'V.showAll()': 'Show all meshes',
      'V.setCamera([x,y,z],[tx,ty,tz])': 'Set camera position/target',
    });

    window.V = V;
    console.log('[Viewer] ready. Models discovered from tileset — check/uncheck to load/unload.');
    console.log('[Viewer] URL params: ?models=A,B&hideZones=D0/HAV0&hideClasses=IfcCovering');
  </script>
</body>
</html>
